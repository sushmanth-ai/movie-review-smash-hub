<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SM Review 3.0 - Telugu Movie Reviews</title>
    <meta name="description" content="SM Review 3.0 - Your ultimate Telugu movie review destination. Get honest reviews, ratings and more!" />
    <meta name="author" content="SM Reviews" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SM Review" />
    <link rel="apple-touch-icon" href="/pwa-icon-192.png" />
    <link rel="icon" href="/pwa-icon-192.png" type="image/png" />

    <meta property="og:title" content="movie-review-smash-hub" />
    <meta property="og:description" content="Lovable Generated Project" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lovable_dev" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7408617720002229"
     crossorigin="anonymous"></script>
  </head>

  <body>
    <div id="root"></div>
    <noscript>
      <div style="color:gold;background:#000;padding:2rem;text-align:center;font-family:sans-serif;">
        <h1>SM Review 3.0</h1>
        <p>Please enable JavaScript to use this app.</p>
      </div>
    </noscript>
    <script>
      // Catch fatal JS errors before React loads
      window.addEventListener('error', function(e) {
        var root = document.getElementById('root');
        if (root && !root.hasChildNodes()) {
          root.innerHTML = '<div style="color:gold;background:#000;padding:2rem;text-align:center;font-family:sans-serif;">' +
            '<h1>⚠️ Loading Error</h1>' +
            '<p style="color:#ccc;">' + (e.message || 'Unknown error') + '</p>' +
            '<p style="color:#999;font-size:12px;">' + (e.filename || '') + ':' + (e.lineno || '') + '</p>' +
            '<button onclick="caches.keys().then(function(k){k.forEach(function(n){caches.delete(n)})});location.reload()" ' +
            'style="background:gold;color:#000;padding:8px 24px;border:none;border-radius:20px;font-weight:bold;margin-top:16px;cursor:pointer;">Clear Cache & Reload</button>' +
            '</div>';
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
